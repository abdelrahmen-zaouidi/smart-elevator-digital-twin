# =============================================================================
# Smart Elevator MQTT broker
# Authenticated (no anonymous), ACL-enforced, TLS on the ESP32-facing listener.
# Security settings are GLOBAL (per_listener_settings false) so every listener
# requires a valid username/password and is subject to the ACL.
#
# This whole directory is bind-mounted to /mosquitto/config, so the paths below
# resolve to sibling files: passwordfile, aclfile, certs/.
# =============================================================================
allow_anonymous false
password_file /mosquitto/config/passwordfile
acl_file /mosquitto/config/aclfile

# Plaintext TCP for intra-Docker clients (bridge, n8n). This stays on the
# Docker network / loopback only and is never exposed to the WiFi/LAN, so TLS
# here is out of scope; it is still authenticated and ACL-enforced.
listener 1883
protocol mqtt

# WebSockets for the browser dashboard (same host). Authenticated + ACL'd.
listener 9001
protocol websockets

# TLS for the ESP32 over WiFi -- the only hop that crosses an untrusted network.
# Server-only TLS: the broker presents server.crt (signed by ca.crt) and the
# ESP32 pins ca.crt. Clients are NOT required to present a certificate
# (require_certificate false); they authenticate with username/password.
listener 8883
protocol mqtt
cafile   /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile  /mosquitto/config/certs/server.key
tls_version tlsv1.2
require_certificate false
