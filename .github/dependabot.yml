version: 2
updates:
  # Root npm workspaces (apps/dashboard, packages/shared). Grouped weekly so
  # PRs stay reviewable; production + dev deps separated.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development

  # The bridge has its own manifest (built as a standalone image).
  - package-ecosystem: npm
    directory: "/services/ditto-bridge"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/infra/docker"
    schedule:
      interval: weekly
