# Continuous integration for the Smart Elevator Digital Twin platform.
#
# Mirrors the project's manual validation suite (see docs/README.md
# "Automated checks") so every push enforces what used to be run by hand:
# safety-gate / dispatch / command-lifecycle assertions, simulator unit
# tests, MQTT topic hygiene, n8n workflow validation, dashboard type
# safety + lint + production build, and the two service container builds.
name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-node:
    name: Node validation suites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install workspaces
        run: npm ci
      - name: Safety gate + dispatch + command lifecycle suites
        run: npm test
      - name: n8n workflow package validation
        run: npm run validate:n8n
      - name: OpenAPI spec validation
        run: npm run openapi:lint

  validate-python:
    name: Python validation suites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Same single runtime dependency the simulator image installs
      # (infra/docker/Dockerfile.simulator).
      - name: Install simulator dependency
        run: pip install paho-mqtt
      - name: Simulator unit tests
        run: python -m unittest tests.test_simulator -v
      - name: MQTT topic hygiene
        run: python scripts/validate_mqtt_topics.py

  dashboard:
    name: Dashboard tests + typecheck + lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install workspaces
        run: npm ci
      - name: Unit + route tests (Vitest)
        run: npm run test:dashboard
      - name: Type safety
        run: npm run typecheck
      - name: Lint (errors fail, warnings are the accepted baseline)
        run: npm run lint
      - name: Production build
        run: npm run build

  docker:
    name: Service image builds + scan + SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build bridge image
        run: docker build -f infra/docker/Dockerfile.bridge -t elevator-bridge:ci .
      - name: Build simulator image
        run: docker build -f infra/docker/Dockerfile.simulator -t elevator-simulator:ci .
      # Fail only on CRITICAL vulnerabilities that have a fix available — keeps
      # the gate actionable rather than noisy.
      - name: Trivy scan (bridge)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: elevator-bridge:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Trivy scan (simulator)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: elevator-simulator:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      # SPDX SBOMs as build artifacts (non-blocking).
      - name: SBOM (bridge)
        uses: anchore/sbom-action@v0
        with:
          image: elevator-bridge:ci
          format: spdx-json
          output-file: sbom-bridge.spdx.json
      - name: SBOM (simulator)
        uses: anchore/sbom-action@v0
        with:
          image: elevator-simulator:ci
          format: spdx-json
          output-file: sbom-simulator.spdx.json
      - uses: actions/upload-artifact@v7
        with:
          name: sboms
          path: sbom-*.spdx.json

  # Playwright smoke needs a LIVE stack (Ditto + demo simulator + dashboard),
  # which the hermetic CI runners do not have. It is therefore manual-only:
  # trigger from the Actions tab. This job documents the runbook; it starts the
  # in-repo stack but NOT the external Ditto stack, so it is expected to be run
  # against an environment where Ditto is reachable. Left as a placeholder gate
  # so the smoke command lives in CI without blocking push builds.
  e2e-smoke:
    name: Playwright smoke (manual, needs live stack)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Smoke (requires E2E_BASE_URL to a reachable ElevatorOS)
        run: npm run e2e --workspace apps/dashboard
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
          E2E_BASIC_USER: ${{ secrets.E2E_BASIC_USER }}
          E2E_BASIC_PASS: ${{ secrets.E2E_BASIC_PASS }}
