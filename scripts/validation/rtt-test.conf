# Throwaway broker config for MQTT RTT measurement only (GAPS M2).
# Anonymous is enabled because this run measures transport latency, NOT auth;
# authentication/ACL are evidenced separately in evidence/mqtt/.
per_listener_settings false
allow_anonymous true

listener 1883
protocol mqtt

listener 8883
protocol mqtt
cafile   /certs/ca.crt
certfile /certs/server.crt
keyfile  /certs/server.key
tls_version tlsv1.2
require_certificate false
