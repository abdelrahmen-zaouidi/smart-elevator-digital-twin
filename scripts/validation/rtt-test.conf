# Throwaway broker config for MQTT RTT measurement only (GAPS M2).
# Anonymous is enabled because this run measures transport latency, NOT auth;
# authentication/ACL are evidenced separately in evidence/mqtt/.
#
# Mount this file's DIRECTORY (with ca.crt/server.crt/server.key copied in, world-
# readable) at /mosquitto/config and use a stable mosquitto 2.0.x image — see
# scripts/measurement/README.md. Single-file bind mounts are unreliable on
# Docker Desktop/Windows, and the broker's mosquitto user must be able to read
# the key (chmod 644).
per_listener_settings false
allow_anonymous true

listener 1883 0.0.0.0
protocol mqtt

listener 8883 0.0.0.0
protocol mqtt
cafile   /mosquitto/config/ca.crt
certfile /mosquitto/config/server.crt
keyfile  /mosquitto/config/server.key
tls_version tlsv1.2
require_certificate false
